<div class="page-container">
  <header class="page-header">
    <h1>Gestión de Clientes</h1>
    <button mat-raised-button color="primary" (click)="openDialog()">
      <mat-icon>add</mat-icon> NUEVO CLIENTE
    </button>
  </header>

  <div class="table-card">
    <div class="toolbar">
      <mat-form-field appearance="outline" class="search-field" subscriptSizing="dynamic">
        <mat-label>Buscar cliente</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Nombre, contacto o teléfono" />
        <mat-icon matPrefix>search</mat-icon>
      </mat-form-field>
    </div>

    <div *ngIf="isLoading" class="state-block">
      <mat-spinner diameter="42"></mat-spinner>
      <span>Cargando clientes…</span>
    </div>

    <div class="table-wrapper" [hidden]="isLoading">
      <table mat-table [dataSource]="dataSource" matSort class="full-width">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
          <td mat-cell *matCellDef="let row"> {{ row.id }} </td>
        </ng-container>

        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Nombre </th>
          <td mat-cell *matCellDef="let row"> {{ row.nombre }} </td>
        </ng-container>

        <ng-container matColumnDef="contacto">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Contacto </th>
          <td mat-cell *matCellDef="let row"> {{ row.contacto }} </td>
        </ng-container>

        <ng-container matColumnDef="telefono">
          <th mat-header-cell *matHeaderCellDef> Teléfono </th>
          <td mat-cell *matCellDef="let row"> {{ row.telefono }} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Acciones </th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button color="primary" (click)="openDialog(row)" matTooltip="Editar">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="delete(row)" matTooltip="Eliminar">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedCols"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedCols;"></tr>
      </table>

      <div *ngIf="dataSource.data.length === 0" class="state-block empty">
        <mat-icon>inbox</mat-icon>
        <span>No hay registros para mostrar.</span>
      </div>

      <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
    </div>
  </div>
</div>
