<div class="login-container">
  <mat-card class="login-card">
    <div class="brand">
      <div class="brand-badge">
        <mat-icon>balance</mat-icon>
      </div>
      <h1 class="brand-name">BASCU-SYS</h1>
      <p class="brand-subtitle">Sistema de Báscula Camionera</p>
    </div>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuario</mat-label>
          <input matInput type="text" formControlName="usuario" autocomplete="username"
                 placeholder="Tu nombre de usuario" />
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="loginForm.get('usuario')?.hasError('required')">
            El usuario es <strong>obligatorio</strong>.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput [type]="hidePassword() ? 'password' : 'text'"
                 formControlName="password" autocomplete="current-password" />
          <button mat-icon-button matSuffix type="button" (click)="togglePassword()"
                  [attr.aria-label]="hidePassword() ? 'Mostrar contraseña' : 'Ocultar contraseña'"
                  [attr.aria-pressed]="!hidePassword()">
            <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            La contraseña es <strong>obligatoria</strong>.
          </mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
            La contraseña debe tener al menos <strong>6 caracteres</strong>.
          </mat-error>
        </mat-form-field>

        <div *ngIf="errorMessage()" class="error-message" role="alert">
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage() }}</span>
        </div>

        <button mat-raised-button color="primary" type="submit"
                class="full-width login-button"
                [disabled]="loginForm.invalid || isLoading()">
          <mat-spinner *ngIf="isLoading()" diameter="22" class="btn-spinner"></mat-spinner>
          <span *ngIf="!isLoading()">Ingresar</span>
          <span *ngIf="isLoading()">Validando…</span>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
